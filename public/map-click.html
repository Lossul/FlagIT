<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Click Challenge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101214;
        --panel: #17191c;
        --border: #2b2f33;
        --text: #f4f4f4;
        --muted: #a0a0a0;
        --accent: #f8d34f;
        --good: #22c55e;
        --bad: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.5rem 3rem;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }

      .title {
        font-size: 2rem;
        margin: 0;
      }

      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem 1.25rem;
        margin-bottom: 1.25rem;
      }

      .target {
        font-size: 1.65rem;
        font-weight: 700;
        margin-top: 0.5rem;
      }

      .feedback {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .map-wrap {
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        background: linear-gradient(180deg, #14171b 0%, #0f1114 100%);
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .country {
        fill: #1f2328;
        stroke: #31353a;
        stroke-width: 0.6;
        transition: fill 0.15s ease, stroke 0.15s ease;
        cursor: pointer;
      }

      .country:hover {
        fill: #2a2f35;
        stroke: #f8d34f;
      }

      .country.correct {
        fill: #14532d;
        stroke: #22c55e;
      }

      .country.wrong {
        fill: #4c1d1d;
        stroke: #ef4444;
      }

      .controls {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.45rem 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.7rem;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      .status {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .status.streak.good {
        color: var(--good);
      }

      .status.streak.bad {
        color: var(--bad);
      }

      select {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.45rem 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.7rem;
      }

      .map-hint {
        margin-top: 0.6rem;
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">Map Click Challenge</h1>
        <div class="pill" id="regionPill">Region: —</div>
      </div>

      <div class="panel">
        <div class="status" id="dateLabel">Daily Target</div>
        <div class="target" id="targetLabel">Loading…</div>
        <div class="feedback" id="feedback">Click the correct country on the map.</div>
        <div class="controls">
          <button id="newTarget">Next Target</button>
          <select id="regionMode">
            <option value="region">Region</option>
            <option value="sub-region">Sub-region</option>
          </select>
          <button id="zoomIn">Zoom +</button>
          <button id="zoomOut">Zoom -</button>
          <button id="zoomReset">Reset</button>
          <div class="status streak" id="streakLabel">Streak: 0</div>
        </div>
        <div class="map-hint">Scroll to zoom, Shift + drag to pan.</div>
      </div>

      <div class="map-wrap">
        <svg id="map" viewBox="0 0 1000 520" role="img" aria-label="World Map"></svg>
      </div>
    </div>

    <script>
      let regionSets = {};
      let regionOrder = [];

      function getDayIndex(date, modulo) {
        if (modulo <= 0) return 0;
        const localDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const epoch = new Date(2024, 0, 1);
        const daysSince = Math.floor((localDate - epoch) / (1000 * 60 * 60 * 24));
        return ((daysSince % modulo) + modulo) % modulo;
      }

      function project([lon, lat], width, height) {
        const x = ((lon + 180) / 360) * width;
        const y = ((90 - lat) / 180) * height;
        return [x, y];
      }

      function ringToPath(ring, width, height) {
        return ring
          .map((point, index) => {
            const [x, y] = project(point, width, height);
            return `${index === 0 ? "M" : "L"}${x.toFixed(2)} ${y.toFixed(2)}`;
          })
          .join(" ") + " Z";
      }

      function polygonToPath(coords, width, height) {
        return coords.map((ring) => ringToPath(ring, width, height)).join(" ");
      }

      function featureToPath(feature, width, height) {
        const { type, coordinates } = feature.geometry;
        if (type === "Polygon") return polygonToPath(coordinates, width, height);
        if (type === "MultiPolygon") {
          return coordinates.map((poly) => polygonToPath(poly, width, height)).join(" ");
        }
        return "";
      }

      const svg = document.getElementById("map");
      const targetLabel = document.getElementById("targetLabel");
      const feedback = document.getElementById("feedback");
      const regionPill = document.getElementById("regionPill");
      const streakLabel = document.getElementById("streakLabel");
      const dateLabel = document.getElementById("dateLabel");
      const newTargetButton = document.getElementById("newTarget");
      const zoomInButton = document.getElementById("zoomIn");
      const zoomOutButton = document.getElementById("zoomOut");
      const zoomResetButton = document.getElementById("zoomReset");
      const regionModeSelect = document.getElementById("regionMode");

      let streak = 0;
      let targetCode = "";
      let targetName = "";
      let featureIndex = 0;
      let featuresByCode = {};
      let currentRegion = "";
      let regionMode = "region";
      let regionByCode = {};
      let subRegionByCode = {};
      let mapGroup = null;
      let zoom = 1;
      let panX = 0;
      let panY = 0;
      let isPanning = false;
      let panStartX = 0;
      let panStartY = 0;

      function setTarget() {
        const codes = regionSets[currentRegion] || Object.keys(featuresByCode);
        if (!codes || codes.length === 0) return;
        targetCode = codes[featureIndex % codes.length];
        const feature = featuresByCode[targetCode];
        targetName = feature ? feature.properties.name : targetCode;
        targetLabel.textContent = `Click ${targetName}`;
        feedback.textContent = "Click the correct country on the map.";
        clearHighlights();
      }

      function clearHighlights() {
        svg.querySelectorAll(".country").forEach((path) => {
          path.classList.remove("correct", "wrong");
        });
      }

      newTargetButton.addEventListener("click", () => {
        featureIndex += 1;
        setTarget();
      });

      function onCountryClick(event) {
        const path = event.currentTarget;
        const clickedCode = path.dataset.code;
        const clickedName = path.dataset.name;
        console.log(clickedName);

        if (clickedCode === targetCode) {
          path.classList.add("correct");
          feedback.textContent = `Correct! ${clickedName} was the target.`;
          streak += 1;
          streakLabel.textContent = `Streak: ${streak}`;
          streakLabel.classList.remove("bad");
          streakLabel.classList.add("good");
          featureIndex += 1;
          setTarget();
        } else {
          path.classList.add("wrong");
          feedback.textContent = `Incorrect — that was ${clickedName}.`;
          streak = 0;
          streakLabel.textContent = `Streak: ${streak}`;
          streakLabel.classList.remove("good");
          streakLabel.classList.add("bad");
        }
      }

      function formatDate(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function buildRegionSets() {
        const source = regionMode === "sub-region" ? subRegionByCode : regionByCode;
        regionSets = {};
        Object.keys(featuresByCode).forEach((code) => {
          const region = source[code];
          if (!region) return;
          if (!regionSets[region]) regionSets[region] = [];
          regionSets[region].push(code);
        });

        regionOrder = Object.keys(regionSets).sort();
        if (regionOrder.length === 0) {
          regionOrder = ["World"];
          regionSets["World"] = Object.keys(featuresByCode);
        }
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function applyTransform() {
        if (!mapGroup) return;
        mapGroup.setAttribute("transform", `translate(${panX} ${panY}) scale(${zoom})`);
      }

      async function initMap() {
        const [geoResponse, regionResponse] = await Promise.all([
          fetch("/world.geojson"),
          fetch("/country-regions.json"),
        ]);
        const geojson = await geoResponse.json();
        const regionData = await regionResponse.json();
        const width = 1000;
        const height = 520;

        featuresByCode = {};
        regionByCode = {};
        subRegionByCode = {};
        regionData.forEach((entry) => {
          const code = entry["alpha-2"];
          if (!code) return;
          regionByCode[code] = entry.region || "";
          subRegionByCode[code] = entry["sub-region"] || "";
        });

        mapGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        mapGroup.setAttribute("id", "mapGroup");
        svg.appendChild(mapGroup);

        geojson.features.forEach((feature) => {
          const code = feature.properties["ISO3166-1-Alpha-2"];
          featuresByCode[code] = feature;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", featureToPath(feature, width, height));
          path.setAttribute("class", "country");
          path.setAttribute("data-name", feature.properties.name);
          path.setAttribute("data-code", code);
          path.addEventListener("click", onCountryClick);
          mapGroup.appendChild(path);
        });

        const now = new Date();
        buildRegionSets();

        const regionIndex = getDayIndex(now, regionOrder.length);
        currentRegion = regionOrder[regionIndex];
        featureIndex = getDayIndex(now, regionSets[currentRegion].length);

        regionPill.textContent = `${regionMode === "sub-region" ? "Sub-region" : "Region"}: ${currentRegion}`;
        dateLabel.textContent = `Daily Target • ${formatDate(now)}`;
        setTarget();
      }

      zoomInButton.addEventListener("click", () => {
        zoom = clamp(zoom * 1.2, 1, 6);
        applyTransform();
      });

      zoomOutButton.addEventListener("click", () => {
        zoom = clamp(zoom / 1.2, 1, 6);
        applyTransform();
      });

      zoomResetButton.addEventListener("click", () => {
        zoom = 1;
        panX = 0;
        panY = 0;
        applyTransform();
      });

      svg.addEventListener("wheel", (event) => {
        event.preventDefault();
        const delta = event.deltaY < 0 ? 1.1 : 0.9;
        zoom = clamp(zoom * delta, 1, 6);
        applyTransform();
      }, { passive: false });

      svg.addEventListener("pointerdown", (event) => {
        if (!event.shiftKey) return;
        isPanning = true;
        panStartX = event.clientX;
        panStartY = event.clientY;
        svg.setPointerCapture(event.pointerId);
      });

      svg.addEventListener("pointermove", (event) => {
        if (!isPanning) return;
        const dx = event.clientX - panStartX;
        const dy = event.clientY - panStartY;
        panStartX = event.clientX;
        panStartY = event.clientY;
        panX += dx;
        panY += dy;
        applyTransform();
      });

      svg.addEventListener("pointerup", (event) => {
        if (!isPanning) return;
        isPanning = false;
        svg.releasePointerCapture(event.pointerId);
      });

      svg.addEventListener("pointerleave", () => {
        isPanning = false;
      });

      regionModeSelect.addEventListener("change", () => {
        regionMode = regionModeSelect.value;
        buildRegionSets();
        const now = new Date();
        const regionIndex = getDayIndex(now, regionOrder.length);
        currentRegion = regionOrder[regionIndex];
        featureIndex = getDayIndex(now, regionSets[currentRegion].length);
        regionPill.textContent = `${regionMode === "sub-region" ? "Sub-region" : "Region"}: ${currentRegion}`;
        streak = 0;
        streakLabel.textContent = "Streak: 0";
        streakLabel.classList.remove("good", "bad");
        setTarget();
      });

      initMap();
    </script>
  </body>
</html>
